<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "Daksh SCRA Report" }}</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #0b1220;
            --muted: #94a3b8;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --accent-2: #22d3ee;
            --card: #111827;
            --border: #1f2937;
            --success: #22c55e;
            --code-bg: #0a101d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 25%),
                        radial-gradient(circle at 80% 0%, rgba(34,211,238,0.08), transparent 20%),
                        var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-2); }
        header {
            padding: 28px 32px 12px;
        }
        .title { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: 0.01em; }
        .subtitle { margin: 6px 0 0; color: var(--muted); }
        .timestamp { color: var(--muted); font-size: 13px; margin-top: 8px; }
        .content { padding: 0 32px 40px; max-width: 1200px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .card h3 { margin: 0 0 6px; font-size: 13px; color: var(--muted); letter-spacing: 0.02em; text-transform: uppercase; }
        .card .value { font-size: 22px; font-weight: 700; color: var(--text); }
        .card-link { text-decoration: none; color: inherit; display: block; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin: 18px 0;
            box-shadow: 0 18px 40px rgba(0,0,0,0.32);
        }
        .panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
            letter-spacing: 0.01em;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(56,189,248,0.12);
            color: var(--text);
            font-size: 12px;
            border: 1px solid var(--border);
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .toc { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .toc a { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-weight: 600; }
        pre, code { font-family: "SFMono-Regular","Consolas","Roboto Mono",monospace; }
        pre { background: var(--code-bg); color: var(--text); padding: 12px; border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; }
        .muted { color: var(--muted); }
        .aoi-entry {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 18px;
            background: var(--card);
        }
        .finding-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .finding-id {
            padding: 10px 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(56,189,248,0.24), rgba(34,211,238,0.22));
            color: var(--text);
            font-weight: 800;
            letter-spacing: 0.08em;
            border: 1px solid var(--border);
            font-size: 14px;
        }
        .finding-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }
        .aoi-meta { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; color: var(--muted); font-size: 13px; }
        .info-stack { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; margin-top: 8px; }
        .info-card {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: 0 8px 18px rgba(0,0,0,0.22);
        }
        .info-card.issue {
            border-color: #f97316;
            background: linear-gradient(135deg, rgba(249,115,22,0.18), rgba(249,115,22,0.08));
            box-shadow: 0 12px 28px rgba(249,115,22,0.18);
        }
        .info-card .label {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--accent-2);
            margin-bottom: 6px;
        }
        .info-card.issue .label { color: #fbbf24; font-size: 13px; letter-spacing: 0.1em; }
        .info-card .text { color: var(--text); font-weight: 650; line-height: 1.5; }
        .code-block { margin-top: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
        .breadcrumbs { font-size: 13px; margin-bottom: 10px; color: var(--muted); }
        .list { list-style: none; padding: 0; margin: 0; }
        .list li { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .list li:last-child { border-bottom: none; }
        .path { font-family: "SFMono-Regular","Consolas","Roboto Mono",monospace; color: var(--text); }
        .label-chip, .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 14px;
            background: rgba(56,189,248,0.14);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
        }
        .badge strong { color: var(--accent-2); letter-spacing: 0.04em; }
        .label-chip {
            background: linear-gradient(135deg, rgba(56,189,248,0.16), rgba(34,211,238,0.14));
        }
        .label-chip .label-title {
            color: var(--accent-2);
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
        }
        .label-chip .label-text {
            color: var(--text);
            font-weight: 650;
        }
        .label-chip.issue {
            border-color: #f97316;
            background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(249,115,22,0.14));
            box-shadow: 0 8px 24px rgba(249,115,22,0.18);
        }
        .label-chip.issue .label-title { color: #fbbf24; font-size: 13px; letter-spacing: 0.1em; }
        .label-chip.issue .label-text { color: #ffe8c7; font-size: 13px; font-weight: 700; }
        .note-block {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
        }
        .note-title {
            font-weight: 800;
            letter-spacing: 0.02em;
            color: var(--text);
        }
        .panel + .panel { margin-top: 12px; }
        /* Pygments overrides */
        table.highlighttable { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; background: var(--code-bg); color: var(--text); border: none; }
        td.linenos { width: 1%; padding: 8px 10px; color: var(--muted); background: #0b1527; border-right: 1px solid #0b1527; }
        td.code { padding: 8px 10px; border-left: 0; }
        .highlight { background: transparent !important; }
        code { color: var(--text); }
        @media print {
            body { background: white; }
            .panel, .card { box-shadow: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="title">{{ title if title else "Daksh SCRA" }}</div>
        {% if subtitle %}
        <div class="subtitle">{{ subtitle }}</div>
        {% endif %}
        <div class="timestamp">Generated {{ generated_at }}</div>
    </header>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
