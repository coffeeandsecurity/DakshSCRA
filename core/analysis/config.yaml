# ─── Taint Analysis Configuration ─────────────────────────────────────────────
# Each platform section follows this schema:
#
#   sources    : list of regex strings that match tainted input expressions
#   sinks      : list of [name, description, regex] triples
#   sanitizers : list of regex strings that indicate a value was sanitized
#   safe_callees: list of call names that should NOT generate partial-flow
#                 findings (logging, type conversions, framework responses, etc.)
#   analyzer   : optional block enabling the platform without code changes:
#                  globs         : list of file glob patterns
#                  mode          : "brace" | "indent" | "end_keyword"
#                  function_def_re : regex with groups (name, params)
#
# Top-level keys control global engine behaviour.
# ───────────────────────────────────────────────────────────────────────────────

# Number of taint-propagation passes over all functions.
# 7 reliably traces chains up to 6 hops deep while converging early via the
# built-in change-detection short-circuit.
max_taint_passes: 7

# ─── Ranking & Scoring ─────────────────────────────────────────────────────────
ranking:
  base_score: 35
  bucket_scores:
    critical: 40
    high: 28
    medium: 16
    low: 8
  bonuses:
    cross_file: 15
    source_role: 8
    call_role: 5
    path_step_multiplier: 2
    path_step_cap: 5
  severity_thresholds:
    critical: 85
    high: 70
    medium: 50
  keywords:
    critical:
      - "eval"
      - "exec"
      - "runtime.exec"
      - "process.start"
      - "scriptengine"
      - "command execution"
      - "dynamic code"
      - "os command"
      - "processbuilder"
      - "marshal.load"
      - "pickle.load"
      - "unserialize"
    high:
      - "sql"
      - "query"
      - "xss"
      - "innerhtml"
      - "outerhtml"
      - "document.write"
      - "template injection"
      - "ssti"
      - "jndi"
      - "ldap"
      - "xpath"
      - "ssrf"
      - "open redirect"
      - "deserialization"
    medium:
      - "httpclient"
      - "openconnection"
      - "webrequest"
      - "file write"
      - "deserialize"
      - "log injection"
      - "path traversal"
      - "response write"
      - "redirect"
  platform_overrides:
    javascript:
      bucket_scores:
        high: 32
      keywords:
        critical:
          - "innerhtml"
          - "outerhtml"
          - "document.write"
          - "dangerouslysetinnerhtml"
        high:
          - "eval"
          - "function("
          - "settimeout"
          - "setinterval"
          - "child_process"
    golang:
      bucket_scores:
        critical: 44
      keywords:
        critical:
          - "exec.command"
          - "command execution"
        high:
          - "db.query"
          - "db.exec"
          - "db.queryrow"
          - "template.parse"
    c:
      bucket_scores:
        critical: 42
      keywords:
        critical:
          - "system"
          - "popen"
          - "execv"
          - "execl"
        high:
          - "sprintf"
          - "strcpy"
          - "strcat"
          - "gets"
          - "printf"

