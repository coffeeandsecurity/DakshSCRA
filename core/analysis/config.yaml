    - "\\b(ServerRequestInterface|RequestInterface)\\b"
  sinks:
    - ["eval", "Dynamic execution with tainted input", "\\beval\\s*\\("]
    - ["exec/system", "Command execution with tainted input", "\\b(exec|system|passthru|shell_exec|popen|proc_open)\\s*\\("]
    - ["preg_replace /e", "Dynamic code via preg_replace with /e modifier", "\\bpreg_replace\\s*\\(\\s*['\"].*\\/e"]
    - ["assert (string)", "Dynamic code via string assertion", "\\bassert\\s*\\(\\s*[\\$\\\"']"]
    - ["mysqli_query", "SQL injection (mysqli)", "\\bmysqli_query\\s*\\("]
    - ["mysql_query", "SQL injection (mysql_*)", "\\bmysql_query\\s*\\("]
    - ["PDO query", "SQL injection (PDO)", "->\\s*(query|exec)\\s*\\("]
    - ["unserialize", "PHP object injection / insecure deserialization", "\\bunserialize\\s*\\("]
    - ["include/require", "File inclusion (LFI/RFI)", "\\b(include|include_once|require|require_once)\\s*[\\$('\"(]"]
    - ["file_put_contents", "Arbitrary file write", "\\bfile_put_contents\\s*\\("]
    - ["file_get_contents (remote)", "SSRF", "\\bfile_get_contents\\s*\\("]
    - ["curl", "SSRF", "\\bcurl_setopt\\s*\\([^,]+,\\s*CURLOPT_URL|\\bcurl_exec\\b"]
    - ["header (redirect)", "Open redirect / header injection", "\\bheader\\s*\\(\\s*['\"]Location"]
    - ["ldap_search", "LDAP injection", "\\bldap_search\\s*\\("]
    - ["xpath", "XPath injection", "\\bsimplexml_load_string\\b|\\b->xpath\\s*\\("]
    - ["mail", "Email header injection", "\\bmail\\s*\\("]
