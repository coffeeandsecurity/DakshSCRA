# ─── PHP ───────────────────────────────────────────────────────────────────────
php:
  sources:
    # Superglobals
    - "\\$_(GET|POST|REQUEST|COOKIE|SERVER|ENV|FILES)\\b"
    # Laravel / Illuminate
    - "\\brequest\\s*->\\s*(input|get|post|query|cookie|header|all|file|only|except|merge|flash|old)\\s*\\("
    - "\\$this\\s*->\\s*input\\s*->\\s*(get|post|cookie|request)\\s*\\("
    - "\\bRequest\\s*::\\s*(input|get|post|query|cookie|header|all|route)\\s*\\("
    - "\\brequest\\s*\\(\\s*\\)\\s*->\\s*(input|get|post|query|cookie|header|all|route)\\s*\\("
    - "\\bInput\\s*::\\s*(get|all|except|only)\\s*\\("
    # Symfony
    - "\\$request\\s*->\\s*(get|query|request|cookies|headers|server|files)\\s*(->\\s*get\\s*\\(|\\[)"
    # CodeIgniter
    - "\\$this\\s*->\\s*input\\s*->\\s*(server|request_headers|get|post|cookie|get_post|post_get|raw_input_stream)\\s*\\("
    # Slim
    - "\\$request\\s*->\\s*(getQueryParam|getParsedBody|getUploadedFiles|getHeaders|getCookieParams|getAttribute)\\s*\\("
    # PHP request functions
    - "\\bgetallheaders\\s*\\("
    - "\\bphp_sapi_name\\b"
    - "\\bhttp_response_code\\b"
    # Type hints in function signature (framework injection)
